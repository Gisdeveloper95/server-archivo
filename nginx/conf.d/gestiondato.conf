# Configuración para gestiondato.duckdns.org
# Este virtual host maneja el dominio gestiondato separado de gestionarchivo

# Resolver DNS dinámicamente
resolver 127.0.0.11 valid=30s;

# HTTP - Redirect to HTTPS
server {
    listen 80;
    server_name gestiondato.duckdns.org;

    return 301 https://$host$request_uri;
}

# HTTPS server para gestiondato.duckdns.org
server {
    listen 443 ssl http2;
    server_name gestiondato.duckdns.org;
    client_max_body_size 2500M;

    # SSL Configuration - Certificados específicos de gestiondato
    ssl_certificate /etc/nginx/ssl/gestiondato/certificate.crt;
    ssl_certificate_key /etc/nginx/ssl/gestiondato/private.key;
    ssl_trusted_certificate /etc/nginx/ssl/gestiondato/ca_bundle.crt;

    # SSL Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Logs
    access_log /var/log/nginx/gestiondato_access.log;
    error_log /var/log/nginx/gestiondato_error.log;

    # Frontend Vue - raíz
    location / {
        set $frontend gestion_dato_frontend;
        proxy_pass http://$frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend Django - Token Auth (login endpoint)
    location /api-token-auth/ {
        set $backend gestion_dato_backend;
        proxy_pass http://$backend:8000/api-token-auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend Django - API
    location /api/ {
        set $backend gestion_dato_backend;
        proxy_pass http://$backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # Backend Django - Preoperacion endpoints (redirige /preoperacion/ a /api/preoperacion/)
    location /preoperacion/ {
        set $backend gestion_dato_backend;
        proxy_pass http://$backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # Backend Django - Postoperacion endpoints
    location /postoperacion/ {
        set $backend gestion_dato_backend;
        proxy_pass http://$backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # Backend Django - App endpoints (operacion, transversal, backup, etc.)
    location /app/ {
        set $backend gestion_dato_backend;
        proxy_pass http://$backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # Backend Django - Scripts endpoints
    location /scripts/ {
        set $backend gestion_dato_backend;
        proxy_pass http://$backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # Backend Django - Reportes endpoints
    location /reportes/ {
        set $backend gestion_dato_backend;
        proxy_pass http://$backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # Django Admin
    location /admin/ {
        set $backend gestion_dato_backend;
        proxy_pass http://$backend:8000/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Archivos estáticos de Django (servidos desde volumen compartido)
    location /static/ {
        alias /app/gestiondato_staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Archivos de media (servidos desde volumen compartido)
    location /media/ {
        alias /app/gestiondato_media/;
        expires 7d;
    }

    # Health check
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
