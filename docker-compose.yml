name: server_archivo

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: server_archivo_postgres
    labels:
      - "com.proyecto=server_archivo"
      - "com.servicio=postgres"
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_EXTERNAL_PORT}:${POSTGRES_PORT}"
    networks:
      - server_archivo_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: server_archivo_redis
    labels:
      - "com.proyecto=server_archivo"
      - "com.servicio=redis"
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT}:6379"
    networks:
      - server_archivo_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Django Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: server_archivo/backend:latest
    container_name: server_archivo_backend
    labels:
      - "com.proyecto=server_archivo"
      - "com.servicio=backend"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Django Core
      - DEBUG=${DEBUG}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}

      # Database
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}

      # Redis
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=6379

      # Celery
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}

      # JWT
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ACCESS_TOKEN_LIFETIME_MINUTES=${JWT_ACCESS_TOKEN_LIFETIME_MINUTES}
      - JWT_REFRESH_TOKEN_LIFETIME_DAYS=${JWT_REFRESH_TOKEN_LIFETIME_DAYS}

      # Email
      - EMAIL_BACKEND=${EMAIL_BACKEND}
      - EMAIL_HOST=${EMAIL_HOST}
      - EMAIL_PORT=${EMAIL_PORT}
      - EMAIL_USE_TLS=${EMAIL_USE_TLS}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD}
      - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL}

      # GROQ AI
      - GROQ_API_KEYS=${GROQ_API_KEYS}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL}
      - GROQ_MAX_TOKENS=${GROQ_MAX_TOKENS}
      - GROQ_TEMPERATURE=${GROQ_TEMPERATURE}

      # NetApp/NAS Repository
      - NETAPP_BASE_PATH=${NETAPP_BASE_PATH}

      # File Upload Settings
      - MAX_UPLOAD_SIZE_MB=${MAX_UPLOAD_SIZE_MB}
      - MAX_PATH_LENGTH=${MAX_PATH_LENGTH}
      - ALLOWED_EXTENSIONS=${ALLOWED_EXTENSIONS}

      # Dictionary
      - DICTIONARY_FILE_PATH=${DICTIONARY_FILE_PATH}

      # Audit
      - AUDIT_LOG_RETENTION_DAYS=${AUDIT_LOG_RETENTION_DAYS}

      # CORS
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}

      # Logging
      - LOG_LEVEL=${LOG_LEVEL}

    volumes:
      - ./backend:/app
      - /mnt/repositorio:/mnt/repositorio:rw
    ports:
      - "${BACKEND_PORT}:8000"
    networks:
      - server_archivo_network
    privileged: true
    command: >
      bash -c "mkdir -p /app/logs && chmod 777 /app/logs &&
      mkdir -p ${NETAPP_BASE_PATH} &&
      python manage.py migrate &&
      python manage.py runserver 0.0.0.0:8000"

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL}
    image: server_archivo/frontend:latest
    container_name: server_archivo_frontend
    labels:
      - "com.proyecto=server_archivo"
      - "com.servicio=frontend"
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      - VITE_API_URL=${VITE_API_URL}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "${VITE_DEV_PORT}:${VITE_DEV_PORT}"
    networks:
      - server_archivo_network
    command: npm run dev -- --host 0.0.0.0

  # Celery Worker - Procesa tareas asíncronas
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: server_archivo/celery_worker:latest
    container_name: server_archivo_celery_worker
    labels:
      - "com.proyecto=server_archivo"
      - "com.servicio=celery_worker"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DEBUG=${DEBUG}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=6379
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
      - NETAPP_BASE_PATH=${NETAPP_BASE_PATH}
      # Papelera de reciclaje
      - TRASH_ENABLED=${TRASH_ENABLED}
      - TRASH_PATH=${TRASH_PATH}
      - TRASH_MAX_SIZE_GB=${TRASH_MAX_SIZE_GB}
      - TRASH_RETENTION_DAYS=${TRASH_RETENTION_DAYS}
      # Archivos adjuntos de mensajería
      - MESSAGE_ATTACHMENTS_PATH=${MESSAGE_ATTACHMENTS_PATH}
      - MESSAGE_ATTACHMENTS_RETENTION_DAYS=${MESSAGE_ATTACHMENTS_RETENTION_DAYS}
      # Email
      - EMAIL_BACKEND=${EMAIL_BACKEND}
      - EMAIL_HOST=${EMAIL_HOST}
      - EMAIL_PORT=${EMAIL_PORT}
      - EMAIL_USE_TLS=${EMAIL_USE_TLS}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD}
      - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL}
    volumes:
      - ./backend:/app
      - /mnt/repositorio:/mnt/repositorio:rw
    networks:
      - server_archivo_network
    command: celery -A config worker -l INFO -Q default

  # Celery Beat - Tareas programadas (scheduler)
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: server_archivo/celery_beat:latest
    container_name: server_archivo_celery_beat
    labels:
      - "com.proyecto=server_archivo"
      - "com.servicio=celery_beat"
    restart: unless-stopped
    depends_on:
      - celery_worker
    environment:
      - DEBUG=${DEBUG}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=6379
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
      - NETAPP_BASE_PATH=${NETAPP_BASE_PATH}
      # Papelera de reciclaje
      - TRASH_ENABLED=${TRASH_ENABLED}
      - TRASH_PATH=${TRASH_PATH}
      - TRASH_RETENTION_DAYS=${TRASH_RETENTION_DAYS}
      # Archivos adjuntos de mensajería
      - MESSAGE_ATTACHMENTS_PATH=${MESSAGE_ATTACHMENTS_PATH}
      - MESSAGE_ATTACHMENTS_RETENTION_DAYS=${MESSAGE_ATTACHMENTS_RETENTION_DAYS}
    volumes:
      - ./backend:/app
      - /mnt/repositorio:/mnt/repositorio:rw
    networks:
      - server_archivo_network
    command: celery -A config beat -l INFO --scheduler django_celery_beat.schedulers:DatabaseScheduler

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: server_archivo_nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    environment:
      - DOMAIN=${DOMAIN}
      - CLIENT_MAX_BODY_SIZE=${CLIENT_MAX_BODY_SIZE}
      - NGINX_MODE=${NGINX_MODE:-development}
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d.available:ro
      - ./nginx/docker-entrypoint.sh:/docker-entrypoint-custom.sh:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./backend/static:/app/static:ro
      - ./backend/media:/app/media:ro
      - ./frontend/dist:/app/frontend/dist:ro
      # Volumes de gestiondato para servir archivos estáticos
      - gestiondato_static:/app/gestiondato_staticfiles:ro
      - gestiondato_media:/app/gestiondato_media:ro
    ports:
      - "${HTTP_PORT}:80"
      - "${HTTPS_PORT}:443"
    networks:
      - server_archivo_network
      - gestiondato_igac_network
    labels:
      - "com.proyecto=server_archivo"
      - "com.servicio=nginx"
    entrypoint: ["/docker-entrypoint-custom.sh"]

  # Ollama AI Server
  ollama:
    image: ollama/ollama:latest
    container_name: server_archivo_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ./ollama_data:/root/.ollama
    environment:
      - OLLAMA_NUM_PARALLEL=4
      - OLLAMA_MAX_LOADED_MODELS=2
    deploy:
      resources:
        limits:
          memory: 16G
        reservations:
          memory: 8G
    networks:
      - server_archivo_network
    labels:
      - "com.proyecto=server_archivo"
      - "com.servicio=ollama"
    healthcheck:
      disable: true

  # Keycloak - Identity and Access Management (IAM/SSO)
  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: server_archivo_keycloak
    labels:
      - "com.proyecto=server_archivo"
      - "com.servicio=keycloak"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Admin credentials
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD}

      # Database configuration
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://postgres:5432/${KEYCLOAK_DB_NAME}
      - KC_DB_USERNAME=${POSTGRES_USER}
      - KC_DB_PASSWORD=${POSTGRES_PASSWORD}

      # Hostname configuration (IP corporativa para acceso en red)
      - KC_HOSTNAME=${KEYCLOAK_HOSTNAME}
      - KC_HOSTNAME_STRICT=false
      - KC_HOSTNAME_ADMIN=${KEYCLOAK_HOSTNAME}
      - KC_HTTP_ENABLED=true

      # Proxy settings (para cuando se use con Nginx)
      - KC_PROXY=edge

      # Fix iframe timeout - Deshabilitar completamente el mecanismo de iframe
      - KC_SPI_LOGIN_PROTOCOL_OPENID_CONNECT_SUPPRESS_LOGOUT_CONFIRMATION_SCREEN=true
      - KEYCLOAK_FRONTEND_URL=http://10.70.10.2:8085
      - KC_HTTP_RELATIVE_PATH=/
      - KC_FEATURES=preview
      - KC_HEALTH_ENABLED=true
    ports:
      - "${KEYCLOAK_PORT}:8080"
    networks:
      - server_archivo_network
    command: start-dev
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080;echo -e 'GET /health/ready HTTP/1.1\r\nhost: 127.0.0.1\r\nConnection: close\r\n\r\n' >&3;if [ $? -eq 0 ]; then echo 'Healthcheck Successful';exit 0;else echo 'Healthcheck Failed';exit 1;fi;"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

networks:
  server_archivo_network:
    driver: bridge
  gestiondato_igac_network:
    external: true
    name: gestion_dato_igac_network

volumes:
  postgres_data:
  redis_data:
  gestiondato_static:
    external: true
    name: gestion_dato_backend_static
  gestiondato_media:
    external: true
    name: gestion_dato_backend_media
